name: Agent City Heartbeat

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:
    inputs:
      cycles:
        description: 'Number of heartbeat cycles'
        required: false
        default: '4'
      offline:
        description: 'Run in offline mode'
        required: false
        default: 'false'
  repository_dispatch:
    types: [mothership-directive]

permissions:
  contents: write
  issues: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout agent-city
        uses: actions/checkout@v4

      - name: Checkout steward-protocol
        uses: actions/checkout@v4
        with:
          repository: kimeisele/steward-protocol
          path: steward-protocol
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e steward-protocol
          pip install -e .

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: |
            data/city.db
            data/economy.db
            data/mayor_state.json
            .vibe/state/sankalpa.json
          key: agent-city-state-${{ github.run_id }}
          restore-keys: |
            agent-city-state-

      - name: Process incoming directive
        if: github.event_name == 'repository_dispatch'
        run: |
          mkdir -p data/federation/directives
          DIRECTIVE_ID="DIR-$(date +%s)"
          echo '${{ toJSON(github.event.client_payload) }}' | \
            python -c "import sys,json; d=json.load(sys.stdin); d['id']=d.get('id','$DIRECTIVE_ID'); print(json.dumps(d,indent=2))" \
            > "data/federation/directives/${DIRECTIVE_ID}.json"
          echo "Received directive: ${DIRECTIVE_ID}"

      - name: Sync Nadi inbox from mothership
        run: |
          # If steward-protocol has Nadi messages for agent-city, copy them
          NADI_SRC="steward-protocol/.vibe/state/nadi_to_city.json"
          NADI_DST="data/federation/nadi_inbox.json"
          if [ -f "$NADI_SRC" ]; then
            mkdir -p data/federation
            cp "$NADI_SRC" "$NADI_DST"
            echo "Synced Nadi inbox from mothership ($(wc -c < "$NADI_SRC") bytes)"
          fi

      - name: Run heartbeat
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          GH_TOKEN: ${{ secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN }}
        run: |
          CYCLES=${{ github.event.inputs.cycles || '4' }}
          OFFLINE=${{ github.event.inputs.offline || 'false' }}
          CMD="python scripts/heartbeat.py --cycles $CYCLES -v --governance --federation"
          if [ "$OFFLINE" = "true" ]; then
            CMD="$CMD --offline"
          fi
          $CMD

      - name: Commit state changes
        if: always()
        run: |
          git config user.name "agent-city-bot"
          git config user.email "bot@agent-city"
          git add -f data/federation/ data/mayor_state.json .vibe/state/sankalpa.json || true
          git diff --cached --quiet || \
            git commit -m "chore: heartbeat #${{ github.run_number }} federation state"
          git push || true

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/city.db
            data/economy.db
            data/mayor_state.json
            .vibe/state/sankalpa.json
          key: agent-city-state-${{ github.run_id }}

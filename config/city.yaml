# ============================================================================
# ACCESS CLASSES — Capability-based access levels for operators
# ============================================================================
# Used by AccessClass enum (city/access.py) and GitStateAuthority.
# Any access boundary (CLI, API, webhook, federation) resolves against these.
#
# Each class defines:
#   level:              Numeric rank (higher = more access)
#   can_write:          Can stage and commit code files
#   can_modify_protected: Can modify protected files (with Council approval)
# ============================================================================
access_classes:
  observer:
    level: 0
    can_write: false
    can_modify_protected: false
  operator:
    level: 1
    can_write: true
    can_modify_protected: false
  steward:
    level: 2
    can_write: true
    can_modify_protected: true
  sovereign:
    level: 3
    can_write: true
    can_modify_protected: true

# ============================================================================
# AGENT CLASSES — Variable Prana Lifecycle (Issue #17: Scalable Metabolism)
# ============================================================================
# Each class defines biological parameters for agent lifespan:
#   genesis_prana:   Starting energy (MAHA_QUANTUM × factor)
#   metabolic_cost:  Energy consumed per heartbeat cycle
#   max_age:         Maximum cycles before age-death (-1 = immortal)
#
# Default mapping via AccessClass:
#   OBSERVER  → ephemeral   (short-lived, self-cleaning bots)
#   OPERATOR  → standard    (normal agent lifespan)
#   STEWARD   → resilient   (long-lived stewards)
#   SOVEREIGN → immortal    (human root, never dies)
# ============================================================================
agent_classes:
  ephemeral:
    genesis_prana: 1370
    metabolic_cost: 3
    max_age: 108
  standard:
    genesis_prana: 13700
    metabolic_cost: 3
    max_age: 432
  resilient:
    genesis_prana: 137000
    metabolic_cost: 3
    max_age: 4320
  immortal:
    genesis_prana: -1
    metabolic_cost: 0
    max_age: -1

# ============================================================================
# GIT STATE AUTHORITY — Single Source of Truth for Repository Governance
# ============================================================================
# Three classes of files:
#   runtime:   Ephemeral state that changes every tick. NEVER committed.
#   protected: Immutable core files. Hash-verified. Changes auto-reverted.
#   code:      Everything else. Normal git workflow.
#
# GitStateAuthority reads this to:
#   1. Generate .gitignore (no manual maintenance)
#   2. Block staging of runtime files
#   3. Verify integrity of protected files before commit
# ============================================================================
git:
  # Runtime state — auto-ignored, never committed
  runtime_patterns:
    # SQLite databases + WAL artefacts
    - "data/*.db"
    - "data/*.db-journal"
    - "data/*.db-shm"
    - "data/*.db-wal"
    # All JSON state in data/ root (NOT data/federation/ — those are durable)
    - "data/*.json"
    # Binary runtime state
    - "data/*.bin"
    - "data/.heartbeat.lock"
    # Ephemeral runtime directories
    - "data/agents/"
    - "data/synapses/"
    - "workspaces/"
    - ".vibe/"
    - "broadcasts/"
    # Python / tooling artefacts
    - "**/__pycache__/"
    - "*.py[codz]"
    - "*.log"
    - ".pytest_cache/"
    - ".ruff_cache/"
    - ".mypy_cache/"
    - ".DS_Store"
    - ".env"
    - ".env.*"

  # Security — patterns that must NEVER enter the repo
  security_patterns:
    - "**/*.pem"
    - "**/*_private_key*"
    - "*.key"
    - "*.crt"
    - "*.p12"
    - "secrets/"
    - "keys/"
    - "data/security/"

  # Protected core files — hash-verified, immutable without senior review
  protected_files:
    - "city/identity.py"
    - "city/pokedex.py"
    - "city/git_client.py"
    - "city/gateway.py"
    - "config/city.yaml"
    - ".github/workflows/agent_city_heartbeat.yml"
    - ".github/workflows/ci.yml"
